# render.yaml — Render deployment configuration
services:
  - type: web
    name: career-platform-api
    runtime: docker
    plan: free # Change if needed
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_MODEL_PROVIDER
        value: "auto"
