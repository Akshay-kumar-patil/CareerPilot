# render.yaml — Render deployment configuration
services:
  - type: web
    name: career-platform-api
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_MODEL_PROVIDER
        value: "auto"

  - type: web
    name: career-platform-ui
    runtime: docker
    dockerfilePath: Dockerfile.frontend
    plan: free
    envVars:
      - key: PORT
        value: "8501"
      - key: API_BASE_URL
        value: "https://career-portal-m5re.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
